version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: savebox_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - savebox_network

networks:
  savebox_network:
    driver: bridge

volumes:
  pg_data:

