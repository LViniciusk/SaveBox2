name: Backend CI

on:
  push:
    branches: [ main, master, backend ]
  pull_request:
    branches: [ main, master, backend ]

jobs:
  Savebox_Backend_Tests:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          cache: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-catch
            mingw-w64-ucrt-x86_64-libpqxx
            mingw-w64-ucrt-x86_64-nlohmann-json
            mingw-w64-ucrt-x86_64-libsodium
            mingw-w64-ucrt-x86_64-libzip
            mingw-w64-ucrt-x86_64-cpr
            mingw-w64-ucrt-x86_64-asio
            mingw-w64-ucrt-x86_64-ccache

      - name: Install PostgreSQL
        shell: pwsh
        run: |
          choco install postgresql15 --params '"/Password:postgres"' -y --no-progress

      - name: Start and bootstrap PostgreSQL
        shell: pwsh
        env:
          PGPASSWORD: postgres
        run: |
          $ErrorActionPreference = 'Stop'
          $pgBin = "C:\Program Files\PostgreSQL\15\bin"
          $psql = Join-Path $pgBin "psql.exe"
          $createdb = Join-Path $pgBin "createdb.exe"

          Start-Service postgresql-x64-15

          & $psql -U postgres -h localhost -p 5432 -d postgres -c "DO `$block`$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'test_role') THEN CREATE ROLE test_role LOGIN PASSWORD 'test_pass'; ELSE ALTER ROLE test_role WITH LOGIN PASSWORD 'test_pass'; END IF; END `$block`$;"

          $dbQuery = & $psql -U postgres -h localhost -p 5432 -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='test_db';"
          if ($dbQuery -ne '1') {
            & $createdb -U postgres -h localhost -p 5432 -O test_role test_db
          }

      - name: Create .env
        shell: pwsh
        run: |
          @"
          DB_USER=test_role
          DB_PASSWORD=test_pass
          DB_NAME=test_db
          DB_HOST=localhost
          DB_PORT=5432

          PASS_PEPPER=lalala
          SAVEBOX_JWT_SECRET=minha_cabeca_ta
          RESEND_API_KEY=piscano
          EMAIL_VALIDATION_API_KEY=lalalaaa

          SAVEBOX_STORAGE_PATH=./savebox_storage/
          "@ | Set-Content -Path .env -Encoding UTF8

      - name: Configure C++ Cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-windows-${{ github.sha }}
          restore-keys: |
            ccache-windows-

      - name: Configure CMake
        shell: msys2 {0}
        run: |
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          cd backend
          cmake -B build -G "MinGW Makefiles" -DCMAKE_CXX_COMPILER_LAUNCHER=ccache .

      - name: Build
        shell: msys2 {0}
        run: |
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          cd backend/build
          cmake --build . --parallel

      - name: Run all tests
        shell: msys2 {0}
        run: |
          cd backend/build
          mkdir -p savebox_storage
          ./savebox_tests.exe --order rand --rng-seed time
